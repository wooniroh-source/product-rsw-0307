<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 예약 - 클린앤파트너즈</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">클린앤파트너즈</a>
            <ul>
                <li><a href="index.html">홈</a></li>
                <li><a href="services.html">서비스 안내</a></li>
                <li><a href="reservation.html">실시간 예약</a></li>
                <li><a href="about.html">브랜드 소개</a></li>
                <li><a href="contact.html">고객센터</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="reservation">
            <h2><i class="fas fa-calendar-alt"></i> 실시간 예약 현황</h2>
            <div class="calendar-container">
                <div class="calendar-header">
                    <button id="prevMonth"><i class="fas fa-chevron-left"></i></button>
                    <h3 id="currentMonthYear"></h3>
                    <button id="nextMonth"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div class="calendar-grid-header">
                    <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
                </div>
                <div id="calendarGrid" class="calendar-grid"></div>
            </div>
            <div id="reservationFormContainer" class="reservation-form-container" style="display: none;">
                <h3><span id="selectedDateText"></span> 예약 신청</h3>
                <form id="reservationForm">
                    <input type="hidden" id="selectedDateInput" name="date">
                    <div class="form-group">
                        <label for="resName">성함</label>
                        <input type="text" id="resName" name="name" required placeholder="홍길동">
                    </div>
                    <div class="form-group">
                        <label for="resPhone">연락처</label>
                        <input type="tel" id="resPhone" name="phone" required placeholder="010-0000-0000">
                    </div>
                    <div class="form-group">
                        <label for="resTime">희망 시간</label>
                        <select id="resTime" name="time" required>
                            <option value="">시간 선택</option>
                            <option value="09:00">09:00</option>
                            <option value="11:00">11:00</option>
                            <option value="14:00">14:00</option>
                            <option value="16:00">16:00</option>
                        </select>
                    </div>
                    <button type="submit" class="btn primary-btn">예약 신청하기</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 클린앤파트너즈 에어컨 청소 서비스. All rights reserved.</p>
    </footer>
    <script src="main.js"></script>
</body>
</html>
