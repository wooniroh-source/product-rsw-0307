<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 예약 - 클린앤파트너즈</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">클린앤파트너즈</a>
            <ul class="nav-menu">
                <li><a href="index.html">홈</a></li>
                <li><a href="services.html">서비스 안내</a></li>
                <li><a href="reservation.html">실시간 예약</a></li>
                <li><a href="about.html">브랜드 소개</a></li>
                <li><a href="contact.html">고객센터</a></li>
            </ul>
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </nav>
    </header>

    <main>
        <section id="reservation-page">
            <div class="section-title">
                <h2>실시간 예약 신청</h2>
                <p>원하시는 날짜를 선택하여 간편하게 예약하세요.</p>
            </div>

            <!-- 이벤트 배너 슬라이더 -->
            <div class="res-banner-slider">
                <div id="res-banner-container" class="res-banner-inner"></div>
                <button class="res-banner-arrow res-banner-prev" id="res-banner-prev"><i class="fas fa-chevron-left"></i></button>
                <button class="res-banner-arrow res-banner-next" id="res-banner-next"><i class="fas fa-chevron-right"></i></button>
                <div id="res-banner-dots" class="res-banner-dots"></div>
            </div>

            <div class="reservation-container">
                <!-- 달력 섹션 -->
                <div class="calendar-wrapper">
                    <div class="calendar-controls">
                        <button id="prevMonthBtn"><i class="fas fa-chevron-left"></i></button>
                        <h3 id="calendarTitle">로딩 중...</h3>
                        <button id="nextMonthBtn"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <div class="calendar-weekdays">
                        <div class="sun">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="sat">토</div>
                    </div>
                    <div id="calendarDays" class="calendar-days-grid">
                        <!-- JS에서 날짜가 생성됨 -->
                    </div>
                    <div class="calendar-legend">
                        <span><span class="dot avail"></span> 예약가능</span>
                        <span><span class="dot full"></span> 예약마감</span>
                    </div>
                </div>

                <!-- 예약 폼 섹션 (기본 숨김) -->
                <div id="bookingFormSection" class="booking-form-wrapper" style="display: none; margin-top: 3rem;">
                    <div class="form-card">
                        <h3><i class="fas fa-check-circle"></i> <span id="displaySelectedDate"></span> 예약</h3>
                        <form id="realtimeBookingForm">
                            <input type="hidden" name="access_key" value="962f5bff-992d-4cc2-b8bf-0b4966759efa">
                            <input type="hidden" id="inputSelectedDate" name="selected_date">
                            
                            <div class="input-group">
                                <label for="userName">예약자 성함</label>
                                <input type="text" id="userName" name="user_name" required placeholder="성함을 입력해주세요">
                            </div>

                            <div class="input-group">
                                <label for="userPhone">연락처</label>
                                <input type="tel" id="userPhone" name="user_phone" required placeholder="010-0000-0000">
                            </div>

                            <div class="input-group">
                                <label for="serviceType">서비스 선택</label>
                                <select id="serviceType" name="service_type" required>
                                    <option value="">서비스를 선택하세요</option>
                                    <option value="wall">벽걸이 에어컨</option>
                                    <option value="stand">스탠드 에어컨</option>
                                    <option value="multi">2-in-1 멀티형</option>
                                    <option value="system">천장형 시스템</option>
                                </select>
                            </div>

                            <div class="input-group">
                                <label for="bookingTime">희망 시간</label>
                                <select id="bookingTime" name="booking_time" required>
                                    <option value="">시간 선택</option>
                                    <option value="09:00">오전 09:00</option>
                                    <option value="11:00">오전 11:00</option>
                                    <option value="14:00">오후 02:00</option>
                                    <option value="16:00">오후 04:00</option>
                                </select>
                            </div>

                            <button type="submit" class="submit-booking-btn">예약 확정하기</button>
                        </form>
                    </div>
                </div>

                <!-- 실시간 예약 현황 섹션 추가 -->
                <div class="live-status-container" style="margin-top: 5rem;">
                    <div class="section-title">
                        <h2>최근 예약 신청 현황</h2>
                        <p>실시간으로 접수되고 있는 예약 내역입니다.</p>
                    </div>
                    <div class="rolling-wrapper">
                        <div class="rolling-header">
                            <div class="col">신청일</div>
                            <div class="col">상태</div>
                            <div class="col">고객명</div>
                            <div class="col">연락처</div>
                            <div class="col">서비스</div>
                        </div>
                        <div class="rolling-container">
                            <div id="live-reservation-list" class="rolling-list">
                                <!-- JS로 리스트 렌더링 -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <p>클린앤파트너즈 에어컨 토탈 케어 | 상담전화: 1588-8776</p>
            <p>&copy; 2026 클린앤파트너즈. All rights reserved.</p>
            <p style="margin-top: 10px; font-size: 0.8rem;"><a href="admin.html" style="color: #444; text-decoration: none;">Admin</a></p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
