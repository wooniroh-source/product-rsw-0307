<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문의하기 - 클린앤파트너즈</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">클린앤파트너즈</a>
            <ul class="nav-menu">
                <li><a href="index.html">홈</a></li>
                <li><a href="services.html">서비스 안내</a></li>
                <li><a href="reservation.html">실시간 예약</a></li>
                <li><a href="about.html">브랜드 소개</a></li>
                <li><a href="contact.html">고객센터</a></li>
            </ul>
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </nav>
    </header>

    <main>
        <section id="contact">
            <div class="section-title">
                <h2>상담 및 문의</h2>
                <p>궁금하신 사항을 남겨주시면 담당자가 확인 후 연락드리겠습니다.</p>
            </div>
            <div id="contact-success" style="display:none; text-align:center; padding: 3rem 0;">
                <i class="fas fa-check-circle" style="font-size:4rem; color:#10b981; margin-bottom:1rem;"></i>
                <h3 style="font-size:1.6rem; font-weight:800; margin-bottom:0.8rem;">문의가 접수되었습니다!</h3>
                <p style="color:#666;">담당자가 확인 후 빠르게 연락드리겠습니다.</p>
                <button onclick="document.getElementById('contact-success').style.display='none'; document.getElementById('contact-form').style.display='block';" class="submit-booking-btn" style="width:auto; padding:0.9rem 2.5rem; margin-top:2rem; font-size:1rem;">추가 문의하기</button>
            </div>
            <form id="contact-form">
                <input type="hidden" name="access_key" value="962f5bff-992d-4cc2-b8bf-0b4966759efa">
                <div class="input-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" required placeholder="성함을 입력하세요">
                </div>
                <div class="input-group">
                    <label for="phone">연락처</label>
                    <input type="tel" id="phone" name="phone" required placeholder="010-0000-0000">
                </div>
                <div class="input-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="5" placeholder="궁금하신 내용을 입력하세요"></textarea>
                </div>
                <button type="submit" class="submit-booking-btn">문의하기 신청</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <p>클린앤파트너즈 에어컨 토탈 케어 | 상담전화: 1588-8776</p>
            <p>&copy; 2026 클린앤파트너즈. All rights reserved.</p>
            <p style="margin-top: 10px; font-size: 0.8rem;"><a href="admin.html" style="color: #444; text-decoration: none;">Admin</a></p>
        </div>
    </footer>
    <script src="main.js"></script>
</body>
</html>
